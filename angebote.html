<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="CampusTech Jena Bundles für Studium, Premium-Alltag und Homeoffice.">
    <title>Angebote | CampusTech Jena</title>
    <link rel="stylesheet" href="style.css">
</head>
<body data-page="offers">
    <header class="site-header">
        <a class="brand" href="index.html" aria-label="CampusTech Jena Startseite"><span class="brand-main">Campus</span><span class="brand-accent">Tech</span><span class="brand-place">Jena</span></a>
        <button class="nav-toggle" type="button" aria-label="Menü öffnen" aria-expanded="false">
            <span></span>
            <span></span>
        </button>
        <nav class="site-nav" aria-label="Hauptnavigation">
            <a href="index.html" data-nav="home">Start</a>
            <a href="produkte.html" data-nav="shop">Produkte</a>
            <a href="angebote.html" data-nav="offers">Angebote</a>
            <a href="vergleich.html" data-nav="compare">Vergleich</a>
            <a href="kontakt.html" data-nav="contact">Service</a>
        </nav>
        <button class="cart-indicator" type="button" data-cart-open>
            Warenkorb <span data-cart-count>0</span>
        </button>
    </header>

    <main>
        <section class="page-hero offers-hero">
            <p class="eyebrow">Bundle-Vorteile</p>
            <h1>Mehr Setup, weniger Einzelkauf.</h1>
            <p>Fertige Kombinationen für Studierende, Premium-Nutzer und produktive Homeoffice-Tage.</p>
        </section>

        <section class="student-discount-section" data-student-discount-promo aria-label="Studentenrabatt"></section>

        <section class="bundle-grid offer-grid" data-offer-grid aria-label="Aktuelle Bundles"></section>

        <section class="membership-section" data-student-membership aria-label="CampusTech Student+"></section>
    </main>

    <footer class="site-footer">
        <p>CampusTech Jena</p>
        <p>Bundles mit lokalen Produktfotos und klarer Ersparnis.</p>
        <p><a href="produkte.html">Zum Shop</a></p>
    </footer>

    <aside class="cart-drawer" data-cart-drawer aria-hidden="true">
        <div class="drawer-head">
            <h2>Warenkorb</h2>
            <button class="icon-btn" type="button" data-cart-close>Schließen</button>
        </div>
        <div class="drawer-items" data-cart-items></div>
        <div class="drawer-total">
            <span>Summe</span>
            <strong data-cart-total>0 €</strong>
        </div>
    </aside>
    <div class="toast" data-toast></div>
    <script src="script.js"></script>
</body>
</html>
